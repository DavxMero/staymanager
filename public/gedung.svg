<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="url(#grad)"/>
  
  <!-- Building -->
  <g fill="white">
    <!-- Main building structure -->
    <rect x="25" y="25" width="50" height="60" fill="white"/>
    
    <!-- Windows - Floor 1 -->
    <rect x="32" y="32" width="8" height="8" fill="#2563eb"/>
    <rect x="46" y="32" width="8" height="8" fill="#2563eb"/>
    <rect x="60" y="32" width="8" height="8" fill="#2563eb"/>
    
    <!-- Windows - Floor 2 -->
    <rect x="32" y="45" width="8" height="8" fill="#2563eb"/>
    <rect x="46" y="45" width="8" height="8" fill="#2563eb"/>
    <rect x="60" y="45" width="8" height="8" fill="#2563eb"/>
    
    <!-- Windows - Floor 3 -->
    <rect x="32" y="58" width="8" height="8" fill="#2563eb"/>
    <rect x="46" y="58" width="8" height="8" fill="#2563eb"/>
    <rect x="60" y="58" width="8" height="8" fill="#2563eb"/>
    
    <!-- Door -->
    <rect x="43" y="72" width="14" height="13" fill="#1e40af"/>
    
    <!-- Roof -->
    <polygon points="20,25 50,10 80,25" fill="#1e3a8a"/>
  </g>
</svg>
